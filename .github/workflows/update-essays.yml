name: Update README with latest essays

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render latest essays into README
        run: |
          node <<'NODE'
          const fs = require("fs");

          const README_PATH = "README.md";
          const FEED_PAGE_URL = "https://shreyasprakash.com/feed/";
          const START = "<!-- BLOG-POST-LIST:START -->";
          const END = "<!-- BLOG-POST-LIST:END -->";
          const MAX_POSTS = 20;
          const EXCLUDED_CATEGORIES = new Set(["rough-notes", "booknotes", "books"]);

          function escapeHtml(value) {
            return String(value ?? "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#39;");
          }

          function formatDate(dateLike) {
            const d = new Date(dateLike);
            if (Number.isNaN(d.getTime())) return "";
            const day = String(d.getUTCDate()).padStart(2, "0");
            const month = d.toLocaleString("en-US", { month: "short", timeZone: "UTC" });
            const year = d.getUTCFullYear();
            return `${day} ${month} ${year}`;
          }

          function decodeHtml(value) {
            return String(value ?? "")
              .replace(/&lt;/g, "<")
              .replace(/&gt;/g, ">")
              .replace(/&quot;/g, '"')
              .replace(/&#34;/g, '"')
              .replace(/&#39;/g, "'")
              .replace(/&apos;/g, "'")
              .replace(/&amp;/g, "&");
          }

          function parseTagList(tagListLiteral) {
            return tagListLiteral
              .split(",")
              .map((tag) => tag.trim().replace(/^"(.*)"$/, "$1"))
              .filter(Boolean);
          }

          async function fetchFeedItems() {
            const response = await fetch(FEED_PAGE_URL, {
              headers: {
                "user-agent":
                  "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              },
            });
            if (!response.ok) {
              throw new Error(`feed page request failed: ${response.status}`);
            }
            const html = decodeHtml(await response.text());
            const matcher =
              /\{"slug":"([^"]+)","id":"[^"]*","title":"([^"]+)","date":"([^"]+)","tags":\[([^\]]*)\]/g;

            const items = [];
            let match;
            while ((match = matcher.exec(html)) !== null) {
              const slug = match[1].replace(/^\/+|\/+$/g, "");
              items.push({
                title: match[2],
                link: `https://shreyasprakash.com/${slug}/`,
                pubDate: match[3],
                categories: parseTagList(match[4]),
              });
            }
            if (items.length === 0) {
              throw new Error("no posts parsed from feed page");
            }
            return items;
          }

          (async () => {
            const items = (await fetchFeedItems())
              .filter((item) => {
                const categories = Array.isArray(item.categories) ? item.categories : [];
                return !categories.some(
                  (category) => EXCLUDED_CATEGORIES.has(String(category).trim().toLowerCase())
                );
              })
              .slice(0, MAX_POSTS);
            const rows = items
              .map((item) => {
                const date = formatDate(item.pubDate);
                const title = escapeHtml(item.title);
                const link = escapeHtml(item.link);
                return `    <tr><td>${date}</td><td><a href="${link}">${title}</a></td></tr>`;
              })
              .join("\n");

            const readme = fs.readFileSync(README_PATH, "utf8");
            const pattern = new RegExp(`(${START})([\\s\\S]*?)(${END})`, "m");
            if (!pattern.test(readme)) {
              throw new Error("README markers not found");
            }

            const replacement = `${START}\n${rows}\n    ${END}`;
            const updated = readme.replace(pattern, replacement);
            fs.writeFileSync(README_PATH, updated, "utf8");

            console.log(`Rendered ${items.length} essay rows into README.md`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit and push README changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update latest essays"
          git push
