name: Update README with latest essays

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout blog source repo
        uses: actions/checkout@v4
        with:
          repository: shreyas-makes/astro-blog-ghost
          path: .tmp/astro-blog-ghost
          fetch-depth: 1
          sparse-checkout: |
            src/content/posts

      - name: Render latest essays into README
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const README_PATH = "README.md";
          const POSTS_DIR = ".tmp/astro-blog-ghost/src/content/posts";
          const SITE_BASE_URL = "https://shreyasprakash.com";
          const START = "<!-- BLOG-POST-LIST:START -->";
          const END = "<!-- BLOG-POST-LIST:END -->";
          const MAX_POSTS = 20;
          const EXCLUDED_CATEGORIES = new Set(["rough-notes", "booknotes", "books"]);
          const EXCLUDED_DIRS = new Set(["attachments", "booknotes", "interviews"]);
          const EXCLUDED_SLUGS = new Set(["now"]);

          function escapeHtml(value) {
            return String(value ?? "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#39;");
          }

          function formatDate(dateLike) {
            const d = new Date(dateLike);
            if (Number.isNaN(d.getTime())) return "";
            const day = String(d.getUTCDate()).padStart(2, "0");
            const month = d.toLocaleString("en-US", { month: "short", timeZone: "UTC" });
            const year = d.getUTCFullYear();
            return `${day} ${month} ${year}`;
          }

          function toSlug(value) {
            return String(value ?? "")
              .toLowerCase()
              .trim()
              .replace(/[^a-z0-9\s-]/g, "")
              .replace(/\s+/g, "-")
              .replace(/-+/g, "-");
          }

          function stripQuotes(value) {
            const trimmed = String(value ?? "").trim();
            if (
              (trimmed.startsWith('"') && trimmed.endsWith('"')) ||
              (trimmed.startsWith("'") && trimmed.endsWith("'"))
            ) {
              return trimmed.slice(1, -1);
            }
            return trimmed;
          }

          function parseFrontmatter(fileContent) {
            const match = fileContent.match(/^---\r?\n([\s\S]*?)\r?\n---/);
            if (!match) return null;

            const lines = match[1].split(/\r?\n/);
            const data = {};
            let inTagsList = false;
            const tags = [];

            for (const rawLine of lines) {
              const line = rawLine.trimEnd();
              if (!line.trim()) continue;

              if (inTagsList) {
                const listMatch = line.match(/^\s*-\s*(.+)$/);
                if (listMatch) {
                  tags.push(stripQuotes(listMatch[1]));
                  continue;
                }
                if (/^\w[\w-]*\s*:/.test(line)) {
                  inTagsList = false;
                } else {
                  continue;
                }
              }

              const kvMatch = line.match(/^(\w[\w-]*)\s*:\s*(.*)$/);
              if (!kvMatch) continue;

              const key = kvMatch[1];
              const value = kvMatch[2];

              if (key === "tags") {
                if (!value || value === "[]") {
                  inTagsList = true;
                } else if (value.startsWith("[") && value.endsWith("]")) {
                  value
                    .slice(1, -1)
                    .split(",")
                    .map((item) => stripQuotes(item))
                    .filter(Boolean)
                    .forEach((item) => tags.push(item));
                }
                continue;
              }

              data[key] = stripQuotes(value);
            }

            data.tags = tags;
            return data;
          }

          function walkMarkdownFiles(rootDir) {
            const files = [];

            function walk(currentDir) {
              const entries = fs.readdirSync(currentDir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(currentDir, entry.name);
                if (entry.isDirectory()) {
                  if (EXCLUDED_DIRS.has(entry.name.toLowerCase())) continue;
                  walk(fullPath);
                  continue;
                }
                if (entry.isFile() && fullPath.toLowerCase().endsWith(".md")) {
                  files.push(fullPath);
                }
              }
            }

            walk(rootDir);
            return files;
          }

          function loadPostsFromRepo() {
            const files = walkMarkdownFiles(POSTS_DIR);
            const posts = [];

            for (const filePath of files) {
              const content = fs.readFileSync(filePath, "utf8");
              const frontmatter = parseFrontmatter(content);
              if (!frontmatter) continue;

              const title = frontmatter.title;
              const date = frontmatter.date;
              if (!title || !date) continue;

              const draft = String(frontmatter.draft || "").toLowerCase() === "true";
              if (draft) continue;

              const tags = Array.isArray(frontmatter.tags) ? frontmatter.tags : [];
              const normalizedTags = tags.map((tag) => String(tag).trim().toLowerCase());
              if (normalizedTags.some((tag) => EXCLUDED_CATEGORIES.has(tag))) continue;

              const slug = (frontmatter.slug || toSlug(title)).replace(/^\/+|\/+$/g, "");
              if (!slug || EXCLUDED_SLUGS.has(slug.toLowerCase())) continue;

              posts.push({
                title,
                pubDate: date,
                link: `${SITE_BASE_URL}/${slug}/`,
              });
            }

            posts.sort((a, b) => new Date(b.pubDate).getTime() - new Date(a.pubDate).getTime());
            return posts;
          }

          (async () => {
            const items = loadPostsFromRepo().slice(0, MAX_POSTS);
            const rows = items
              .map((item) => {
                const date = formatDate(item.pubDate);
                const title = escapeHtml(item.title);
                const link = escapeHtml(item.link);
                return `    <tr><td>${date}</td><td><a href="${link}">${title}</a></td></tr>`;
              })
              .join("\n");

            const readme = fs.readFileSync(README_PATH, "utf8");
            const pattern = new RegExp(`(${START})([\\s\\S]*?)(${END})`, "m");
            if (!pattern.test(readme)) {
              throw new Error("README markers not found");
            }

            const replacement = `${START}\n${rows}\n    ${END}`;
            const updated = readme.replace(pattern, replacement);
            fs.writeFileSync(README_PATH, updated, "utf8");

            console.log(`Rendered ${items.length} essay rows into README.md`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit and push README changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update latest essays"
          git push
